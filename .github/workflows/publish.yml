name: Publish

on:
    # Fires automatically when a vX.Y.Z tag is pushed to any branch
    push:
        tags:
            - "v*"

    # Manual trigger — useful for re-publishing or testing the workflow.
    # If no tag is supplied the version is read from package/package.json.
    workflow_dispatch:
        inputs:
            tag:
                description: "Git tag to release (e.g. v0.1.0). Tag must already exist on the target commit."
                required: false
                default: ""

jobs:
    publish:
        name: Publish to npm and GitHub Releases
        runs-on: ubuntu-latest

        permissions:
            contents: write # create / edit GitHub releases
            id-token: write # npm provenance attestations (SLSA) + trusted publishing

        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/build

            # ── Version validation ──────────────────────────────────────────────
            # Fail fast if the package.json version doesn't match the tag.

            - name: Validate version
              run: |
                  if [ "${{ github.event_name }}" = "push" ]; then
                      TAG="${{ github.ref_name }}"
                  elif [ -n "${{ inputs.tag }}" ]; then
                      TAG="${{ inputs.tag }}"
                  else
                      TAG=""
                  fi

                  PKG_VERSION=$(jq -r .version package/package.json)

                  if [ -n "$TAG" ]; then
                      EXPECTED="${TAG#v}"
                      if [ "$PKG_VERSION" != "$EXPECTED" ]; then
                          echo "::error::Tag $TAG does not match package version $PKG_VERSION"
                          exit 1
                      fi
                  fi

                  echo "Package is at version $PKG_VERSION — OK"

            # ── Determine release tag ───────────────────────────────────────────

            - name: Determine release tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "push" ]; then
                      echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
                  elif [ -n "${{ inputs.tag }}" ]; then
                      echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                  else
                      echo "name=v$(jq -r .version package/package.json)" >> "$GITHUB_OUTPUT"
                  fi

            # ── Pack ───────────────────────────────────────────────────────────
            # Pack before publishing so a broken pack doesn't leave us in a
            # half-published state.

            - name: Pack package
              run: |
                  DEST="${{ github.workspace }}/release-tarballs"
                  mkdir -p "$DEST"
                  cd package && npm pack --ignore-scripts --pack-destination "$DEST"

            # ── Publish ─────────────────────────────────────────────────────────
            # npm authenticates via OIDC (Trusted Publisher) — no stored token needed.
            # Trusted Publisher OIDC auth requires npm >=11.5.1, so we switch to
            # Node 24 (npm 11.x) for publishing.

            - uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Publish @tsci/sym
              run: npm publish --ignore-scripts --access public --provenance
              working-directory: package

            # ── GitHub Release ──────────────────────────────────────────────────

            - name: Create or update GitHub release
              run: |
                  TAG="${{ steps.tag.outputs.name }}"
                  if gh release view "$TAG" &>/dev/null; then
                      # Release already exists — just attach the tarballs
                      gh release upload "$TAG" release-tarballs/*.tgz --clobber
                  else
                      gh release create "$TAG" \
                          --title "$TAG" \
                          --generate-notes \
                          release-tarballs/*.tgz
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}
